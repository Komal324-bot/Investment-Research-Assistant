spring.application.name=investment-agent

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/investment_agent}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

gemini.api.key=${GEMINI_API_KEY}
finnhub.api.key=${FINNHUB_API_KEY}
newsapi.api.key=${NEWSAPI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
twelvedata.api.key=${TWELVEDATA_API_KEY}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

server.port=${PORT:8080}
